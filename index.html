<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 심박 측정</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: #111;
  color: white;
}

h1 {
  margin-top: 20px;
}

video {
  width: 90%;
  max-width: 360px;
  border-radius: 12px;
  margin-top: 10px;
}

button {
  font-size: 18px;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  background: #ff4444;
  color: white;
}

#bpm {
  font-size: 40px;
  color: #00ffcc;
}

#status {
  margin-top: 10px;
  color: #ccc;
}
</style>
</head>

<body>

<h1>📱 심박 측정</h1>

<button onclick="start()">측정 시작</button>

<p id="status">대기 중</p>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

<h2>심박수</h2>
<div id="bpm">--</div>

<p style="color: #66aaff;">
손가락으로 카메라를 완전히 덮고 10초 이상 유지하세요
</p>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let signal = [];
let times = [];
let interval;

// 카메라 시작
async function start() {
  document.getElementById("status").innerText = "카메라 시작 중...";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" }
      }
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      document.getElementById("status").innerText = "측정 준비 중...";
      setTimeout(beginMeasure, 2000);
    };

  } catch (e) {
    document.getElementById("status").innerText = "❌ 카메라 권한 필요";
    console.error(e);
  }
}

// 측정 시작
function beginMeasure() {
  document.getElementById("status").innerText = "측정 중...";
  
  signal = [];
  times = [];

  interval = setInterval(captureFrame, 80);
}

// 프레임 캡처
function captureFrame() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = frame.data;

  let redSum = 0;

  for (let i = 0; i < data.length; i += 4) {
    redSum += data[i]; // R값
  }

  let avg = redSum / (data.length / 4);

  // 부드럽게 (노이즈 제거)
  if (signal.length > 0) {
    avg = 0.7 * signal[signal.length - 1] + 0.3 * avg;
  }

  signal.push(avg);
  times.push(Date.now());

  // 데이터 유지 길이
  if (signal.length > 200) {
    signal.shift();
    times.shift();
    calculateBPM();
  }
}

// 심박 계산
function calculateBPM() {

  let peaks = 0;

  const avg = signal.reduce((a,b)=>a+b) / signal.length;

  for (let i = 1; i < signal.length - 1; i++) {
    if (
      signal[i] > signal[i - 1] &&
      signal[i] > signal[i + 1] &&
      signal[i] > avg + 1.5
    ) {
      peaks++;
    }
  }

  const duration = (times[times.length - 1] - times[0]) / 1000;

  const bpm = Math.round((peaks / duration) * 60);

  if (bpm > 40 && bpm < 180) {
    document.getElementById("bpm").innerText = bpm + " BPM";
  } else {
    document.getElementById("bpm").innerText = "...";
  }
}
</script>

</body>
</html>
