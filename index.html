<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>헬스 통합 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; margin:20px; }
nav button { margin-right:10px; }
section { display:none; margin-top:20px; }
.active { display:block; }
video, canvas { width:200px; }
</style>
</head>
<body>

<h2>헬스 통합 시스템</h2>

<nav>
<button onclick="showPage('heart')">심박 측정</button>
<button onclick="showPage('drug')">혈중 농도 계산</button>
<button onclick="showPage('compare')">실측 vs 예측</button>
</nav>

<!-- ================= 심박 ================= -->
<section id="heart" class="active">
<h3>심박 측정</h3>

<video id="video" autoplay playsinline></video><br>
<button onclick="startCamera()">카메라 시작</button>
<button onclick="stopCamera()">중지</button>

<p>심박수: <span id="bpm">--</span> BPM</p>
<canvas id="heartChart"></canvas>
</section>

<!-- ================= 약물 ================= -->
<section id="drug">
<h3>혈중 농도 계산</h3>

투여량 <input id="dose"><br>
반감기 <input id="half"><br>
투여 간격 <input id="interval"><br>
총 시간 <input id="total"><br>
최대값 <input id="max"><br>
최소값 <input id="min"><br>
중단 시간 <input id="stop"><br>
시간 단위 <input id="unit" value="1"><br>

<button onclick="calcDrug()">계산</button>

<canvas id="drugChart"></canvas>
</section>

<!-- ================= 비교 ================= -->
<section id="compare">
<h3>실측 vs 예측</h3>

실측값(콤마):<br>
<input id="real"><br>
예측값 자동 사용<br>

<button onclick="compareData()">비교</button>

<p id="result"></p>
<canvas id="compareChart"></canvas>
</section>

<script>
function showPage(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* ================= 심박 ================= */
let video = document.getElementById("video");
let stream, interval;
let signal=[], times=[];

async function startCamera(){
 try{
  stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
  startMeasure();
 }catch(e){
  alert("카메라 접근 실패");
 }
}

function stopCamera(){
 if(stream) stream.getTracks().forEach(t=>t.stop());
 clearInterval(interval);
}

function startMeasure(){
 signal=[]; times=[];
 interval = setInterval(()=>{
  try{
   let val = Math.random()*100; // fallback
   signal.push(val);
   times.push(Date.now());

   if(signal.length>50){
    let avg = signal.reduce((a,b)=>a+b)/signal.length;
    let peaks=0;
    for(let i=1;i<signal.length;i++){
     if(signal[i] > avg + 3) peaks++;
    }
    let bpm = peaks*6;
    document.getElementById("bpm").innerText = bpm;
   }

   drawHeart();
  }catch(e){}
 },200);
}

function drawHeart(){
 new Chart(document.getElementById("heartChart"),{
  type:"line",
  data:{labels:signal.map((_,i)=>i), datasets:[{data:signal}]},
  options:{animation:false}
 });
}

/* ================= 약물 ================= */
let predicted=[];

function calcDrug(){
 try{
  let dose = parseFloat(document.getElementById("dose").value);
  let half = parseFloat(document.getElementById("half").value);
  let interval = parseFloat(document.getElementById("interval").value);
  let total = parseFloat(document.getElementById("total").value);
  let max = parseFloat(document.getElementById("max").value);
  let min = parseFloat(document.getElementById("min").value);
  let stop = parseFloat(document.getElementById("stop").value);
  let unit = parseFloat(document.getElementById("unit").value);

  if([dose,half,interval,total,unit].some(isNaN)){
    alert("필수값 입력");
    return;
  }

  predicted=[];
  let k = Math.log(2)/half;

  for(let t=0;t<=total;t+=unit){
   let c=0;
   if(t<=stop){
    for(let n=0;n*interval<=t;n++){
     c += dose*Math.exp(-k*(t-n*interval));
    }
   }
   if(max && c>max) c=max;
   if(min && c<min) c=min;
   predicted.push(c);
  }

  new Chart(document.getElementById("drugChart"),{
   type:"line",
   data:{labels:predicted.map((_,i)=>i), datasets:[{data:predicted}]}
  });

 }catch(e){
  alert("계산 오류");
 }
}

/* ================= 비교 ================= */
function compareData(){
 try{
  let real = document.getElementById("real").value
    .split(",").map(x=>parseFloat(x.trim()))
    .filter(x=>!isNaN(x));

  if(real.length===0 || predicted.length===0){
    alert("데이터 부족");
    return;
  }

  let len = Math.min(real.length, predicted.length);
  let error=0;

  for(let i=0;i<len;i++){
    error += Math.abs(real[i]-predicted[i]);
  }

  let avgError = error/len;

  // 맞춤 반감기 추정
  let bestHalf=0, bestErr=Infinity;

  for(let h=0.1;h<50;h+=0.1){
    let k = Math.log(2)/h;
    let err=0;

    for(let i=0;i<len;i++){
      let pred = predicted[i]*Math.exp(-k*i);
      err += Math.abs(pred-real[i]);
    }

    if(err<bestErr){
      bestErr=err;
      bestHalf=h;
    }
  }

  document.getElementById("result").innerText =
   "평균 오차: "+avgError.toFixed(2) +
   " / 추정 반감기: "+bestHalf.toFixed(2);

  new Chart(document.getElementById("compareChart"),{
   type:"line",
   data:{
    labels:real.map((_,i)=>i),
    datasets:[
     {label:"실측", data:real},
     {label:"예측", data:predicted}
    ]
   }
  });

 }catch(e){
  alert("비교 오류");
 }
}
</script>

</body>
</html>
